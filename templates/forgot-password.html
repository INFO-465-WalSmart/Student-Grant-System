<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Forgot Password</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e6e6e6;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(420px, 92vw);
      background: #121a2b;
      border: 1px solid #223055;
      border-radius: 14px;
      padding: 22px;
      text-align: center;
    }
    a {
      color: #93c5fd;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Forgot Password</h1>
    <p>Password reset is not implemented in this demo version.</p>
    <a href="/">Back to login</a>
  </main>

</html>
