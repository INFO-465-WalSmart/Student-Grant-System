{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Create Account</h1>
    <form method="post" action="{{ url_for('register') }}" class="two-col">
        <div>
            <label>Email</label>
<input type="email" name="username" placeholder="student@email.com" required>
        </div>
        <div>
            <label>Password</label>
            <input name="password" type="password" required>
        </div>
        <div><button type="submit">Create Account</button></div>
    </form>
</div>
{% endblock %}
