{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Login</h1>
    <p class="muted">Use <strong>admin / admin123</strong> for the admin view or <strong>student / student123</strong> for the student view.</p>
    <form method="post" action="{{ url_for('login') }}" class="two-col">
        <div>
            <label>Username</label>
            <input name="username" required>
        </div>
        <div>
            <label>Password</label>
            <input name="password" type="password" required>
        </div>
        <div><button type="submit">Login</button></div>
    </form>
</div>
{% endblock %}
