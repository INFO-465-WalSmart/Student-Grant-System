<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login | Student Grant System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e6e6e6;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(420px, 92vw);
      background: #121a2b;
      border: 1px solid #223055;
      border-radius: 14px;
      padding: 22px;
    }
    label { display:block; margin:12px 0 6px; }
    input {
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #2a3a66;
      background:#0e1627;
      color:#e6e6e6;
      box-sizing:border-box;
    }
    .btn {
      width:100%;
      margin-top:16px;
      padding:11px 12px;
      border:0;
      border-radius:10px;
      background:#3b82f6;
      color:#fff;
      font-weight:700;
      cursor:pointer;
    }
    .links { margin-top:14px; display:flex; justify-content:space-between; }
    a { color:#93c5fd; text-decoration:none; }
    .flash { padding:12px; border-radius:10px; margin-bottom:14px; }
    .flash.success { background:#063d2d; color:#86efac; }
    .flash.error { background:#4a1010; color:#fca5a5; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Sign in</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <button class="btn" type="submit">Login</button>
    </form>

    <div class="links">
      <a href="/signup">Create account</a>
      <a href="/forgot-password">Forgot password?</a>
    </div>
  </main>
</body>
</html>
