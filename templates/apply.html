<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apply | Student Grant System</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e6e6e6;
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(500px, 92vw);
      background: #121a2b;
      border: 1px solid #223055;
      border-radius: 14px;
      padding: 22px;
    }
    h1 {
      margin-bottom: 10px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #2a3a66;
      background: #0e1627;
      color: white;
    }
    button {
      margin-top: 18px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    a {
      display: block;
      margin-top: 12px;
      color: #93c5fd;
      text-align: center;
    }
  </style>
</head>
<body>

  <main class="card">
    <h1>Apply for a Grant</h1>

    <form action="/submit-application" method="POST">

      <label>Full Name</label>
      <input name="student_name" type="text" required>

      <label>Email</label>
      <input name="email" type="email" required>

      <label>Grant Type</label>
      <select name="grant_type" required>
        <option value="">Select a grant</option>
        <option value="Academic">Academic</option>
        <option value="Research">Research</option>
        <option value="Travel">Travel</option>
      </select>

      <label>Amount Requested ($)</label>
      <input name="amount" type="number" required>

      <button type="submit">Submit Application</button>
    </form>

    <a href="/dashboard">Back to Dashboard</a>

  </main>

</body>
</html>
