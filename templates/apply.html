{% extends "base.html" %}
{% block content %}
<div class="card">
    <h1>Apply for a Grant</h1>
    <p class="muted">Choose a grant and complete the required application details.</p>
</div>

<div class="card">
    <form method="post" action="{{ url_for('submit_application') }}">
        <h2>Grant Selection</h2>
        <label>Grant</label>
        <select name="grant_id" required>
            <option value="">Select a grant</option>
            {% for grant in grants %}
                <option value="{{ grant.id }}">{{ grant.grant_name }} - {{ grant.grant_type }} (${{ grant.award_amount }})</option>
            {% endfor %}
        </select>

        <h2>Student Information</h2>
        <div class="two-col">
            <div><label>Student Name</label><input name="student_name" required></div>
            <div><label>Student ID</label><input name="student_id" required></div>
            <div><label>Email</label><input name="email" type="email" required></div>
            <div><label>Phone</label><input name="phone" required></div>
            <div><label>Education Level</label><select name="education_level"><option>Undergraduate</option><option>Graduate</option><option>High School</option></select></div>
            <div><label>School Name</label><input name="school_name" required></div>
            <div><label>Academic Year</label><select name="academic_year"><option>Freshman</option><option>Sophomore</option><option>Junior</option><option>Senior</option><option>Any</option></select></div>
            <div><label>Major</label><input name="major" required></div>
            <div><label>GPA</label><input name="gpa" type="number" min="0" max="4" step="0.01" required></div>
            <div><label>Enrollment Status</label><select name="enrollment_status"><option>Full-time</option><option>Part-time</option><option>Any</option></select></div>
            <div><label>Semester</label><input name="semester" placeholder="Fall 2026" required></div>
        </div>

        <h2>Application Details</h2>
        <label>Reason for Applying</label>
        <textarea name="reason" required></textarea>
        <label>How will the funds be used?</label>
        <textarea name="fund_use" required></textarea>
        <label>Other Aid</label>
        <textarea name="other_aid"></textarea>
        <label>Special Circumstances</label>
        <textarea name="special_circumstances"></textarea>
        <p><label><input type="checkbox" name="agreement_confirmed" required style="width:auto;"> I confirm this information is accurate.</label></p>
        <p><label><input type="checkbox" name="enrollment_confirmed" required style="width:auto;"> I confirm my enrollment status.</label></p>
        <button type="submit">Submit Application</button>
    </form>
</div>
{% endblock %}
